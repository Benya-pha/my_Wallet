  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Wallet, ArrowUpRight, ArrowDownRight, Briefcase, CheckCircle2, 
      Circle, Image as ImageIcon, Download, Upload, Plus, CreditCard,
      FileText, Calendar, Clock, ChevronRight, Calculator, X, AlertCircle,
      LayoutGrid, History, Settings, Trash2
    } from 'lucide-react';

    // --- i18n Dictionary ---
    const dict = {
      th: {
        welcome: 'ยินดีต้อนรับ', appTitle: 'Wealth', appSubtitle: 'Plan',
        freeCash: 'คงเหลือ', income: 'รับ', expense: 'จ่าย',
        simTitle: 'ทดลองใช้เงิน', simSub: 'จำลองรายจ่าย (ไม่บันทึกจริง)',
        simItem: 'สิ่งที่จะซื้อ', simPrice: 'ราคา', simBefore: 'ยอดก่อนซื้อ:', simDeduct: 'หักจำลอง:', simRemain: 'เงินจะเหลือ:', simWarn: 'คำเตือน: ยอดเงินจะติดลบ',
        importData: 'นำเข้าข้อมูล', exportData: 'สำรองข้อมูล (JSON)', exportCSV: 'ส่งออกเป็น Excel (CSV)',
        addRecord: 'บันทึกรายการใหม่',
        typeBudget: 'จ่ายจากงบ', typeExpense: 'จ่ายนอกงบ', typeIncome: 'รายรับ', typeCreate: 'ตั้งงบเพิ่ม',
        itemName: 'ชื่อรายการ', amount: 'จำนวนเงิน (บาท)', date: 'วันที่',
        budgetSelect: 'เลือกหมวดหมู่งบประมาณ', defaultSelect: '-- เลือกเป้าหมาย --',
        attachSlip: 'แนบรูปภาพสลิป', slipDone: 'แนบสลิปเรียบร้อยแล้ว (คลิกเปลี่ยน)',
        paidStatus: 'ชำระเงินเรียบร้อยแล้ว', saveBtn: 'บันทึกข้อมูล',
        budgetTitle: 'หมวดหมู่งบประมาณ', itemsCount: 'รายการ', spent: 'ใช้ไปแล้ว', remaining: 'คงเหลือ',
        pendingTitle: 'รายการค้างจ่าย', historyTitle: 'ประวัติรายการทั้งหมด', noHistory: 'ยังไม่มีรายการบันทึก',
        tabBudget: 'งบประมาณ', tabForm: 'บันทึก', tabHistory: 'ประวัติ',
        settings: 'การตั้งค่า', language: 'ภาษา', theme: 'Theme', dataManagement: 'จัดการข้อมูล',
        statusPaid: 'ชำระแล้ว', statusPending: 'รอชำระ',
        themeAuto: 'Auto (System setting)',
        liquidDay: '(Day)', liquidNight: '(Night)',
        deleteBudgetConfirm: 'คุณต้องการลบหมวดหมู่นี้ใช่หรือไม่?\n(ประวัติรายการใช้จ่ายเดิมจะไม่ถูกลบ)', deletedBudget: '(งบถูกลบแล้ว)'
      },
      en: {
        welcome: 'Welcome', appTitle: 'Wealth', appSubtitle: 'Plan',
        freeCash: 'Balance', income: 'In', expense: 'Out',
        simTitle: 'Simulator', simSub: 'Simulate expense (Not saved)',
        simItem: 'Item to buy', simPrice: 'Price', simBefore: 'Before:', simDeduct: 'Sim. Deduct:', simRemain: 'Remaining:', simWarn: 'Warning: Balance will be negative',
        importData: 'Import Data', exportData: 'Backup (JSON)', exportCSV: 'Export to Excel (CSV)',
        addRecord: 'Add New Record',
        typeBudget: 'From Budget', typeExpense: 'Extra Expense', typeIncome: 'Income', typeCreate: 'New Budget',
        itemName: 'Item Name', amount: 'Amount', date: 'Date',
        budgetSelect: 'Select Budget Category', defaultSelect: '-- Select Target --',
        attachSlip: 'Attach Slip Image', slipDone: 'Slip attached (Click to change)',
        paidStatus: 'Already Paid', saveBtn: 'Save Record',
        budgetTitle: 'Budget Categories', itemsCount: 'items', spent: 'Spent', remaining: 'Left',
        pendingTitle: 'Pending Payments', historyTitle: 'Transaction History', noHistory: 'No records found',
        tabBudget: 'Budgets', tabForm: 'Add', tabHistory: 'History',
        settings: 'Settings', language: 'Language', theme: 'Theme', dataManagement: 'Data Management',
        statusPaid: 'Paid', statusPending: 'Pending',
        themeAuto: 'Auto (System setting)',
        liquidDay: '(Day)', liquidNight: '(Night)',
        deleteBudgetConfirm: 'Delete this category?\n(Past transactions will remain safe)', deletedBudget: '(Deleted)'
      }
    };

    // --- Custom Hook for Local Storage ---
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : (typeof initialValue === 'function' ? initialValue() : initialValue);
        } catch { return typeof initialValue === 'function' ? initialValue() : initialValue; }
      });
      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (e) {}
      };
      return [storedValue, setValue];
    }

    // --- Theme Config ---
    const getThemeStyles = (activeTheme) => {
      if(activeTheme === 'liquid_night') return {
        app: 'bg-slate-950', textMain: 'text-slate-100', muted: 'text-slate-400',
        card: 'bg-slate-900/60 backdrop-blur-xl border-slate-800/50 shadow-md',
        header: 'bg-slate-900/60 backdrop-blur-md border-slate-800',
        nav: 'bg-slate-900/90 backdrop-blur-xl border-slate-800',
        input: 'bg-slate-950/50 border-slate-800 focus:ring-indigo-500/50 text-slate-100',
        tabActive: 'bg-gradient-to-tr from-indigo-600 to-purple-600 text-white shadow-lg shadow-indigo-900/50',
        borderSoft: 'border-slate-800', isDark: true, isLiquid: true
      };
      
      // Default: liquid_day
      return {
        app: 'bg-[#FDFBF7]', textMain: 'text-slate-700', muted: 'text-slate-400',
        card: 'bg-white/70 backdrop-blur-xl border-white/60 shadow-sm',
        header: 'bg-gradient-to-br from-indigo-50/80 via-white/80 to-pink-50/80 backdrop-blur-md border-white',
        nav: 'bg-white/90 backdrop-blur-xl border-slate-100',
        input: 'bg-slate-50 border-slate-100 focus:ring-indigo-100 text-slate-700',
        tabActive: 'bg-gradient-to-tr from-blue-500 to-indigo-400 text-white shadow-lg shadow-blue-200',
        borderSoft: 'border-slate-100', isDark: false, isLiquid: true
      };
    };

    const getBudgetTheme = (spent, initialAmount, isDark) => {
      if (initialAmount <= 0) return { bg: isDark?'bg-slate-800':'bg-slate-200', text: isDark?'text-slate-400':'text-slate-600', light: isDark?'bg-slate-800/50 border-slate-700':'bg-slate-50 border-slate-200', bar: isDark?'bg-slate-700':'bg-slate-300' };
      const remaining = initialAmount - spent;
      const percentSpent = (spent / initialAmount) * 100;
      if (remaining < 0) {
        return isDark ? { bg: 'bg-red-950/80', text: 'text-rose-400', light: 'bg-rose-950/30 border-rose-900/50', bar: 'bg-rose-700', label: 'text-rose-200 bg-rose-950 border-rose-900' } : { bg: 'bg-rose-800', text: 'text-rose-800', light: 'bg-rose-50 border-rose-300', bar: 'bg-rose-800', label: 'text-rose-100 bg-rose-800 border-rose-800' };
      } else if (remaining === 0 || percentSpent >= 100) {
        return isDark ? { bg: 'bg-rose-900/50', text: 'text-rose-300', light: 'bg-rose-900/20 border-rose-800/50', bar: 'bg-rose-500', label: 'text-rose-300 bg-slate-900 border-slate-700' } : { bg: 'bg-rose-400', text: 'text-rose-600', light: 'bg-rose-50 border-rose-200', bar: 'bg-rose-400', label: 'text-rose-600 bg-white border-slate-100' };
      } else if (percentSpent >= 80) {
        return isDark ? { bg: 'bg-orange-900/50', text: 'text-orange-300', light: 'bg-orange-900/20 border-orange-800/50', bar: 'bg-orange-500', label: 'text-orange-300 bg-slate-900 border-slate-700' } : { bg: 'bg-orange-300', text: 'text-orange-700', light: 'bg-orange-50/50 border-orange-200', bar: 'bg-orange-300', label: 'text-orange-700 bg-white border-slate-100' };
      } else if (percentSpent >= 50) {
        return isDark ? { bg: 'bg-amber-900/50', text: 'text-amber-300', light: 'bg-amber-900/20 border-amber-800/50', bar: 'bg-amber-500', label: 'text-amber-300 bg-slate-900 border-slate-700' } : { bg: 'bg-amber-300', text: 'text-amber-700', light: 'bg-amber-50/50 border-amber-200', bar: 'bg-amber-300', label: 'text-amber-700 bg-white border-slate-100' };
      } else {
        return isDark ? { bg: 'bg-emerald-900/50', text: 'text-emerald-300', light: 'bg-emerald-900/20 border-emerald-800/50', bar: 'bg-emerald-500', label: 'text-emerald-300 bg-slate-900 border-slate-700' } : { bg: 'bg-emerald-300', text: 'text-emerald-700', light: 'bg-emerald-50/50 border-emerald-200', bar: 'bg-emerald-300', label: 'text-emerald-700 bg-white border-slate-100' };
      }
    };

    const getInitialBudgets = () => [
      { id: 'b1', name: 'Eat (กิน)', initialAmount: 2200, createdAt: new Date().toISOString() },
      { id: 'b2', name: 'Grab (เดินทาง)', initialAmount: 800, createdAt: new Date().toISOString() },
      { id: 'b3', name: 'Cafe (คาเฟ่)', initialAmount: 200, createdAt: new Date().toISOString() },
      { id: 'b4', name: 'Dormitory & Laundry', initialAmount: 4660, createdAt: new Date().toISOString() },
      { id: 'b5', name: 'Internet', initialAmount: 426.93, createdAt: new Date().toISOString() }
    ];

    const getInitialTransactions = () => [{
      id: 'init_inc', title: 'รายรับเริ่มต้น (Income)', amount: 8500, date: new Date().toISOString().split('T')[0], type: 'income', isPaid: true, slipImage: null
    }];

    function App() {
      // Settings State
      const [lang, setLang] = useLocalStorage('wealth_lang_v5', 'th');
      const [themeMode, setThemeMode] = useLocalStorage('wealth_theme_mode_v5', 'auto');
      
      const currentLang = dict[lang] ? lang : 'th';
      const t = (key) => dict[currentLang][key] || key;

      // Theme Evaluation
      const [isSystemDark, setIsSystemDark] = useState(false);
      useEffect(() => {
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        setIsSystemDark(mediaQuery.matches);
        const handler = (e) => setIsSystemDark(e.matches);
        if (mediaQuery.addEventListener) mediaQuery.addEventListener('change', handler);
        else mediaQuery.addListener(handler);
        return () => {
          if (mediaQuery.removeEventListener) mediaQuery.removeEventListener('change', handler);
          else mediaQuery.removeListener(handler);
        };
      }, []);

      const activeTheme = themeMode === 'auto' ? (isSystemDark ? 'liquid_night' : 'liquid_day') : themeMode;
      const thm = getThemeStyles(activeTheme);

      // Data State
      const [transactions, setTransactions] = useLocalStorage('wealth_tx_v9', getInitialTransactions);
      const [budgets, setBudgets] = useLocalStorage('wealth_bd_v9', getInitialBudgets);
      
      // UI State
      const [activeTab, setActiveTab] = useState('form');
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [isSimulatorOpen, setIsSimulatorOpen] = useState(false);
      
      // Form State
      const [formType, setFormType] = useState('budget_expense');
      const [formData, setFormData] = useState({ title: '', amount: '', date: new Date().toISOString().split('T')[0], budgetId: '', isPaid: true, slipImage: null });
      const [simName, setSimName] = useState('');
      const [simAmount, setSimAmount] = useState('');

      const fileInputRef = useRef(null);
      const importFileRef = useRef(null);

      // Splash Screen
      const [showSplash, setShowSplash] = useState(() => {
        try { return !sessionStorage.getItem('wealth_splash_seen'); } 
        catch(e) { return true; }
      });
      const [fadeSplash, setFadeSplash] = useState(false);

      useEffect(() => {
        if (showSplash) {
          const t1 = setTimeout(() => setFadeSplash(true), 2000);
          const t2 = setTimeout(() => {
            setShowSplash(false);
            try { sessionStorage.setItem('wealth_splash_seen', 'true'); } catch(e) {}
          }, 2500);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }
      }, [showSplash]);

      // --- Calculations ---
      const { totalBalance, totalIncome, totalExpense } = useMemo(() => {
        let income = 0; let expense = 0;
        transactions.forEach(tr => { 
          if (tr.type === 'income') income += tr.amount; 
          if (tr.type === 'expense' || tr.type === 'budget_expense') expense += tr.amount; 
        });
        return { totalBalance: income - expense, totalIncome: income, totalExpense: expense };
      }, [transactions]); 

      const activeBudgets = useMemo(() => {
        return budgets.map(budget => {
          const spent = transactions.filter(tr => tr.type === 'budget_expense' && tr.budgetId === budget.id).reduce((sum, tr) => sum + tr.amount, 0);
          return { ...budget, spent, remaining: budget.initialAmount - spent };
        });
      }, [budgets, transactions]);

      const pendingExpenses = useMemo(() => transactions.filter(tr => tr.type === 'expense' && !tr.isPaid), [transactions]);

      // --- Handlers ---
      const handleInputChange = (e) => {
        const { name, value, type, checked } = e.target;
        setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setFormData(prev => ({ ...prev, slipImage: reader.result }));
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!formData.title || !formData.amount) return;

        const amountNum = parseFloat(formData.amount);
        const newTx = { id: Date.now().toString(), title: formData.title, amount: amountNum, date: formData.date, type: formType, slipImage: formData.slipImage, createdAt: new Date().toISOString() };

        if (formType === 'budget_create') {
          setBudgets([...budgets, { id: Date.now().toString(), name: formData.title, initialAmount: amountNum, createdAt: new Date().toISOString() }]);
        } else {
          if (formType === 'expense') newTx.isPaid = formData.isPaid;
          else if (formType === 'budget_expense') {
            if (!formData.budgetId) { alert(t('budgetSelect')); return; }
            const targetB = budgets.find(b => b.id === formData.budgetId);
            newTx.budgetId = formData.budgetId;
            newTx.budgetNameSnapshot = targetB ? targetB.name : '';
          }
          setTransactions([newTx, ...transactions]);
        }
        setFormData({ title: '', amount: '', date: new Date().toISOString().split('T')[0], budgetId: '', isPaid: true, slipImage: null });
        if (fileInputRef.current) fileInputRef.current.value = '';
        setActiveTab(formType !== 'budget_create' ? 'history' : 'budgets');
      };

      const togglePaidStatus = (id) => {
        setTransactions(transactions.map(t => t.id === id ? { ...t, isPaid: !t.isPaid } : t));
      };
      
      const handleDeleteBudget = (id, name) => {
        if(window.confirm(`${t('deleteBudgetConfirm')}\n\n[ ${name} ]`)) {
          setBudgets(budgets.filter(b => b.id !== id));
        }
      };

      const handleExportData = () => {
        const data = { version: 9, budgets, transactions };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `WealthPlan_Backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };
      
      // ฟังก์ชันส่งออกเป็นไฟล์ CSV สำหรับเปิดใน Excel
      const handleExportCSV = () => {
        let csvContent = lang === 'th' 
          ? "วันที่,ประเภท,ชื่อรายการ,หมวดหมู่,จำนวนเงิน,สถานะ\n"
          : "Date,Type,Item Name,Category,Amount,Status\n";
          
        transactions.forEach(tr => {
          const date = tr.date;
          let typeStr = "";
          if (lang === 'th') {
            typeStr = tr.type === 'income' ? 'รายรับ' : (tr.type === 'expense' ? 'จ่ายนอกงบ' : 'จ่ายจากงบ');
          } else {
            typeStr = tr.type === 'income' ? 'Income' : (tr.type === 'expense' ? 'Extra Expense' : 'From Budget');
          }
          
          const title = `"${tr.title.replace(/"/g, '""')}"`;
          let budgetName = '-';
          if (tr.type === 'budget_expense') {
            const b = budgets.find(b => b.id === tr.budgetId);
            budgetName = b ? `"${b.name.replace(/"/g, '""')}"` : `"${(tr.budgetNameSnapshot || '').replace(/"/g, '""')}"`;
          }
          
          const amount = tr.amount;
          let status = '-';
          if (tr.type !== 'income') {
            status = tr.isPaid ? t('statusPaid') : t('statusPending');
          }
          
          csvContent += `${date},${typeStr},${title},${budgetName},${amount},${status}\n`;
        });

        // ใช้ BOM \uFEFF เพื่อให้ Excel อ่านสระภาษาไทยได้ถูกต้อง
        const bom = "\uFEFF";
        const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `WealthPlan_History_${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleImportFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.budgets && data.transactions) {
              if (window.confirm("Overwrite all data?")) { 
                setBudgets(data.budgets); 
                setTransactions(data.transactions); 
                setIsSettingsOpen(false); 
              }
            } else alert("Invalid file format.");
          } catch (err) { alert("Error reading file."); }
          if (importFileRef.current) importFileRef.current.value = '';
        };
        reader.readAsText(file);
      };

      const handleImportClick = () => {
        if (importFileRef.current) importFileRef.current.click();
      };

      const formatMoney = (amount) => new Intl.NumberFormat(lang === 'th' ? 'th-TH' : 'en-US', { style: 'currency', currency: 'THB', minimumFractionDigits: 2 }).format(amount);
      const simAmountNum = parseFloat(simAmount) || 0;
      const simResult = totalBalance - simAmountNum;

      // --- Views ---
      const FormView = () => (
        <div className="h-full w-full overflow-y-auto overflow-x-hidden overscroll-contain pb-[120px] pt-6 px-4 md:px-8 animate-enter custom-scrollbar">
          <div className={`max-w-xl mx-auto rounded-[2rem] p-6 lg:p-8 ${thm.card}`}>
            <div className="flex items-center gap-3 mb-6">
              <div className="p-2.5 bg-blue-500/10 text-blue-500 rounded-2xl">
                <Plus className="w-5 h-5" />
              </div>
              <h3 className={`text-lg font-semibold tracking-tight ${thm.textMain}`}>{t('addRecord')}</h3>
            </div>

            <div className={`grid grid-cols-2 md:grid-cols-4 gap-2 mb-8 p-1.5 rounded-2xl shadow-inner ${thm.isDark ? 'bg-slate-900' : 'bg-slate-100/50'} ${thm.borderSoft} border`}>
              {[ { id: 'budget_expense', label: t('typeBudget') }, { id: 'expense', label: t('typeExpense') }, { id: 'income', label: t('typeIncome') }, { id: 'budget_create', label: t('typeCreate') }
              ].map(type => (
                <button key={type.id} type="button" onClick={() => setFormType(type.id)}
                  className={`text-[12px] py-2.5 px-1 rounded-xl transition-all duration-300 font-medium active:scale-95 ${
                    formType === type.id ? `${thm.isDark ? 'bg-slate-700 text-white' : 'bg-white text-blue-600'} shadow-sm` : `${thm.muted} hover:${thm.textMain}`
                  }`}
                >
                  {type.label}
                </button>
              ))}
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="space-y-2">
                <label className={`text-[11px] font-semibold ml-1 tracking-wider uppercase ${thm.muted}`}>{t('itemName')}</label>
                <div className="relative group">
                  <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none group-focus-within:text-blue-400">
                    <FileText className={`h-4 w-4 ${thm.muted} group-focus-within:text-blue-400`} />
                  </div>
                  <input type="text" name="title" value={formData.title} onChange={handleInputChange} placeholder="..." required
                    className={`input-impeccable w-full pl-11 pr-4 py-3.5 text-[16px] md:text-sm rounded-2xl outline-none shadow-sm ${thm.input}`} />
                </div>
              </div>
              
              <div className="space-y-2">
                <label className={`text-[11px] font-semibold ml-1 tracking-wider uppercase ${thm.muted}`}>{t('amount')}</label>
                <div className="relative group">
                  <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <span className={`font-medium text-sm group-focus-within:text-blue-400 ${thm.muted}`}>฿</span>
                  </div>
                  <input type="number" name="amount" value={formData.amount} onChange={handleInputChange} placeholder="0.00" min="0" step="0.01" required
                    className={`input-impeccable tabular-nums w-full pl-11 pr-4 py-3.5 text-[16px] md:text-sm rounded-2xl outline-none shadow-sm ${thm.input}`} />
                </div>
              </div>

              {formType === 'budget_expense' && (
                <div className="space-y-2 animate-enter">
                  <label className={`text-[11px] font-semibold ml-1 tracking-wider uppercase ${thm.muted}`}>{t('budgetSelect')}</label>
                  <div className="relative group">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">

                  <div className="space-y-1.5">
                    <label className={`text-[11px] font-semibold uppercase tracking-wider ml-1 ${thm.muted}`}>{t('simItem')}</label>
                    <input type="text" value={simName} onChange={(e) => setSimName(e.target.value)} placeholder="..." className={`input-impeccable w-full px-4 py-3.5 text-[16px] md:text-sm rounded-2xl outline-none shadow-sm ${thm.input}`} />
                  </div>
                  <div className="space-y-1.5">
                    <label className={`text-[11px] font-semibold uppercase tracking-wider ml-1 ${thm.muted}`}>{t('simPrice')}</label>
                    <input type="number" value={simAmount} onChange={(e) => setSimAmount(e.target.value)} placeholder="0.00" className={`input-impeccable tabular-nums w-full px-4 py-3.5 text-[16px] md:text-base rounded-2xl outline-none shadow-sm ${thm.input}`} />
                  </div>
                </div>
                <div className={`rounded-3xl p-5 border shadow-inner ${thm.isDark ? 'bg-slate-900/50 border-slate-800' : 'bg-slate-50/80 border-slate-100'}`}>
                  <div className="flex justify-between items-center mb-3"><span className={`text-sm font-medium ${thm.muted}`}>{t('simBefore')}</span><span className={`text-sm font-semibold tabular-nums ${thm.textMain}`}>{formatMoney(totalBalance)}</span></div>
                  <div className="flex justify-between items-center mb-4"><span className={`text-sm font-medium ${thm.muted}`}>{t('simDeduct')}</span><span className="text-sm font-semibold tabular-nums text-rose-500">-{formatMoney(simAmountNum)}</span></div>
                  <div className={`h-px w-full mb-4 ${thm.borderSoft} border-b`}></div>
                  <div className="flex justify-between items-end"><span className={`text-sm font-bold tracking-wide ${thm.textMain}`}>{t('simRemain')}</span><span className={`text-2xl font-bold tabular-nums tracking-tight ${simResult < 0 ? 'text-rose-500' : (thm.isDark?'text-emerald-400':'text-emerald-500')}`}>{formatMoney(simResult)}</span></div>
                  {simResult < 0 && ( <div className={`mt-4 flex items-center gap-2 p-3 rounded-2xl border shadow-sm ${thm.isDark ? 'bg-rose-950/50 border-rose-900 text-rose-400' : 'bg-rose-50 border-rose-100 text-rose-500'}`}><AlertCircle className="w-4 h-4 shrink-0" /><span className="text-[11px] font-medium leading-tight">{t('simWarn')}</span></div> )}
                </div>
              </div>
            </div>
          )}

          {/* COMPACT HEADER */}
          <header className={`flex-none z-20 pt-3 pb-4 px-4 md:px-8 relative ${thm.header}`}>
            <div className="max-w-4xl mx-auto">
              <div className="flex justify-between items-center mb-3 relative">
                <div className="flex items-center gap-2.5">
                  <div className={`w-10 h-10 rounded-xl shadow-sm border overflow-hidden flex items-center justify-center shrink-0 ${thm.isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'}`}>
                    <img src="./logo.png?v=4" alt="App Logo" className="w-full h-full object-cover bg-white" onError={(e) => { e.target.style.display='none'; e.target.nextElementSibling.style.display='block'; }} />
                    <Wallet className="w-5 h-5 text-indigo-500 hidden" />
                  </div>
                  <h1 className={`text-lg font-bold tracking-wide ${thm.textMain}`}>{t('appTitle')}<span className="text-indigo-500 font-medium">{t('appSubtitle')}</span></h1>
                </div>
                <div className="flex items-center gap-1.5">
                  <button onClick={() => setIsSimulatorOpen(true)} className={`p-2 rounded-xl active:scale-95 border ${thm.isDark ? 'bg-indigo-500/20 text-indigo-400 border-indigo-500/30' : 'bg-indigo-50 hover:bg-indigo-100 text-indigo-500 border-indigo-100/50'}`}><Calculator className="w-4 h-4" /></button>
                  <div className={`h-5 w-px mx-1 ${thm.isDark ? 'bg-slate-700' : 'bg-slate-200'}`}></div>
                  <button onClick={() => setIsSettingsOpen(true)} className={`p-2 rounded-xl active:scale-95 border shadow-sm ${thm.isDark ? 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700' : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}><Settings className="w-4 h-4" /></button>
                </div>
              </div>
              <div className={`flex gap-4 items-end justify-between relative p-3 rounded-2xl border shadow-sm ${thm.isDark ? 'bg-slate-900/50 border-slate-800 backdrop-blur-md' : 'bg-white/60 border-white backdrop-blur-md'}`}>
                <div className="flex-1">
                  <p className={`text-[10px] mb-0.5 font-semibold tracking-wider uppercase ${thm.muted}`}>{t('freeCash')}</p>
                  <h2 className={`text-2xl md:text-3xl font-extrabold tracking-tight tabular-nums ${totalBalance < 0 ? 'text-rose-500' : thm.textMain}`}>{formatMoney(totalBalance)}</h2>
                </div>
                <div className="flex flex-col gap-1.5">
                  <div className={`px-2 py-1 rounded-lg border shadow-sm flex justify-between items-center gap-3 min-w-[90px] ${thm.isDark ? 'bg-slate-800 border-emerald-900/50' : 'bg-white border-emerald-100'}`}>
                    <div className={`flex items-center gap-1 ${thm.isDark ? 'text-emerald-400' : 'text-emerald-500'}`}><ArrowUpRight className="w-3 h-3" /><span className="text-[9px] font-bold tracking-wider">{t('income')}</span></div>
                    <p className={`text-[11px] font-bold tabular-nums ${thm.textMain}`}>{formatMoney(totalIncome)}</p>
                  </div>
                  <div className={`px-2 py-1 rounded-lg border shadow-sm flex justify-between items-center gap-3 min-w-[90px] ${thm.isDark ? 'bg-slate-800 border-rose-900/50' : 'bg-white border-rose-100'}`}>
                    <div className={`flex items-center gap-1 ${thm.isDark ? 'text-rose-400' : 'text-rose-500'}`}><ArrowDownRight className="w-3 h-3" /><span className="text-[9px] font-bold tracking-wider">{t('expense')}</span></div>
                    <p className={`text-[11px] font-bold tabular-nums ${thm.textMain}`}>{formatMoney(totalExpense)}</p>
                  </div>
                </div>
              </div>
            </div>
          </header>

          {/* MAIN CONTENT */}
          <main className="flex-1 relative z-10 min-h-0"><div className="absolute inset-0">{activeTab === 'form' && FormView()}{activeTab === 'budgets' && BudgetsView()}{activeTab === 'history' && HistoryView()}</div></main>

          {/* BOTTOM NAV */}
          <nav className={`flex-none pb-safe pt-2 px-6 shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-20 pb-6 rounded-t-[2rem] absolute bottom-0 w-full ${thm.nav}`}>
            <div className="max-w-md mx-auto flex justify-between items-center relative">
              <button onClick={() => setActiveTab('budgets')} className={`flex flex-col items-center gap-1 p-2 w-20 ${activeTab === 'budgets' ? (thm.isDark?'text-indigo-400 -translate-y-1':'text-indigo-500 -translate-y-1') : thm.muted}`}>
                <div className={`p-2.5 rounded-2xl ${activeTab === 'budgets' ? (thm.isDark?'bg-slate-800 shadow-sm':'bg-indigo-50 shadow-sm') : ''}`}><LayoutGrid className="w-5 h-5" /></div>
                <span className="text-[10px] font-bold tracking-wide">{t('tabBudget')}</span>
              </button>
              <button onClick={() => setActiveTab('form')} className={`flex flex-col items-center gap-1 p-2 w-20 ${activeTab === 'form' ? 'text-white -translate-y-2' : thm.muted}`}>
                <div className={`p-4 rounded-[1.25rem] ${activeTab === 'form' ? thm.tabActive : (thm.isDark?'bg-slate-800 border border-slate-700':'bg-slate-50 border border-slate-100')}`}>
                  <Plus className={`w-6 h-6 ${activeTab === 'form' ? 'text-white' : thm.muted}`} />
                </div>
                <span className={`text-[10px] font-bold tracking-wide mt-1 ${activeTab === 'form' ? (thm.isDark?'text-indigo-400':'text-indigo-500') : ''}`}>{t('tabForm')}</span>
              </button>
              <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 p-2 w-20 ${activeTab === 'history' ? (thm.isDark?'text-indigo-400 -translate-y-1':'text-indigo-500 -translate-y-1') : thm.muted}`}>
                <div className={`p-2.5 rounded-2xl ${activeTab === 'history' ? (thm.isDark?'bg-slate-800 shadow-sm':'bg-indigo-50 shadow-sm') : ''}`}><History className="w-5 h-5" /></div>
                <span className="text-[10px] font-bold tracking-wide">{t('tabHistory')}</span>
              </button>
            </div>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
